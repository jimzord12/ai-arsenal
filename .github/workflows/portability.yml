name: Portability

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  process-and-distribution:
    name: ${{ matrix.os }} process and distribution smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Exercise the real CLI and packed artifact
        run: pnpm --filter @jz/ai-arsenal-features-cli exec jest test/e2e.test.ts --runInBand
