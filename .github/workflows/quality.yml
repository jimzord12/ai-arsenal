name: Quality

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting, lint, types, tests, and coverage
        run: pnpm check

      - name: Pack and validate the private source artifact
        run: pnpm validate
